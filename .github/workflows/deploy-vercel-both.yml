# Deploy this repository to both production apps on every push to `main`.
#
# Secrets: each job uses a GitHub Environment (see `matrix.environment`). Put the same
#   VERCEL_TOKEN
# in both environments (Settings → Environments → "Production – …" → Environment secrets),
# or use one repository-level Actions secret instead (Settings → Secrets and variables → Actions).
# Token: https://vercel.com/account/tokens (access to team wearevalues-projects)
#
# Environment names must match GitHub exactly (including the dash character).
#
# If a project is also connected to this repo under Vercel → Git, you may get two
# production builds for that project per push. Prefer either:
#   • Disconnect Git on the project(s) and rely on this workflow only, or
#   • Remove that project from the matrix and keep native Git deploy for it only.

name: Deploy to Vercel (both brands)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-both-${{ github.ref }}
  cancel-in-progress: false

env:
  # Quieter GitHub warnings about Node 20 in older action internals
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  production:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: photo-uploader
            project_id: prj_CPslILPSDxoD4tbY8SrQSMZKxEzi
            environment: "Production – photo-uploader"
          - name: valuesupload
            project_id: prj_PAlJ92RZvmwF5m4z1K86vmUfTtHd
            environment: "Production – valuesupload"

    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Point Vercel CLI at ${{ matrix.name }}
        env:
          VERCEL_PROJECT_ID: ${{ matrix.project_id }}
          VERCEL_PROJECT_NAME: ${{ matrix.name }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          fs.mkdirSync(".vercel", { recursive: true });
          fs.writeFileSync(
            ".vercel/project.json",
            JSON.stringify({
              projectId: process.env.VERCEL_PROJECT_ID,
              orgId: "team_TXsIpOODCmVGCrSzRN9MD73Q",
              projectName: process.env.VERCEL_PROJECT_NAME
            })
          );
          NODE

      - name: Verify Vercel auth and target
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN is empty for this environment. Add it under Settings → Environments → ${{ matrix.environment }} → Environment secrets."
            exit 1
          fi
          npx vercel@51.6.1 whoami --token "$VERCEL_TOKEN"
          echo "Linked project file:"
          cat .vercel/project.json

      - name: Deploy ${{ matrix.name }} (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Retry: photo-uploader often has Vercel Git + Actions deploy racing on the same push.
          for attempt in 1 2 3; do
            echo "Deploy attempt ${attempt}..."
            if npx vercel@51.6.1 deploy --prod --yes --token "$VERCEL_TOKEN"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Vercel deploy failed after 3 attempts. Open the log above for the CLI error."
              exit 1
            fi
            sleep 25
          done
